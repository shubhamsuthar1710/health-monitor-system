<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#f0f9ff"/>
  <!-- Background circles -->
  <circle cx="50" cy="50" r="60" fill="#e0f2fe" opacity="0.5"/>
  <circle cx="350" cy="250" r="80" fill="#dbeafe" opacity="0.5"/>
  <!-- Person/Patient -->
  <circle cx="120" cy="90" r="30" fill="#fce7f3"/>
  <circle cx="120" cy="90" r="24" fill="#fbcfe8"/>
  <circle cx="110" cy="85" r="2.5" fill="#374151"/>
  <circle cx="130" cy="85" r="2.5" fill="#374151"/>
  <path d="M112 98 Q120 104 128 98" stroke="#374151" stroke-width="2" fill="none"/>
  <!-- Body/Shirt -->
  <path d="M95 115 Q80 125 80 150 L80 200 Q80 220 100 220 L140 220 Q160 220 160 200 L160 150 Q160 125 145 115" fill="#3b82f6"/>
  <!-- Heart on shirt -->
  <circle cx="120" cy="160" r="15" fill="#ef4444"/>
  <path d="M120 152 L115 158 Q108 165 120 172 Q132 165 125 158 Z" fill="#fff"/>
  <!-- Health metrics display -->
  <rect x="200" y="50" width="140" height="100" rx="8" fill="#1e293b"/>
  <rect x="200" y="50" width="140" height="25" rx="8" fill="#334155"/>
  <circle cx="325" cy="62" r="6" fill="#10b981"/>
  <rect x="210" y="90" width="40" height="50" rx="2" fill="#10b981"/>
  <rect x="260" y="85" width="70" height="8" rx="2" fill="#3b82f6"/>
  <rect x="260" y="100" width="55" height="8" rx="2" fill="#8b5cf6"/>
  <rect x="260" y="115" width="60" height="8" rx="2" fill="#f59e0b"/>
  <rect x="260" y="130" width="45" height="8" rx="2" fill="#ec4899"/>
  <!-- Blood pressure -->
  <rect x="80" y="170" width="80" height="60" rx="6" fill="#fff" stroke="#e5e7eb"/>
  <path d="M90 215 Q95 205 105 215" stroke="#ef4444" stroke-width="3" fill="none"/>
  <rect x="100" y="200" width="50" height="6" rx="3" fill="#ef4444" opacity="0.7"/>
  <rect x="105" y="190" width="40" height="6" rx="3" fill="#ef4444" opacity="0.7"/>
  <!-- Medication -->
  <rect x="220" y="170" width="120" height="70" rx="6" fill="#fff" stroke="#e5e7eb"/>
  <rect x="225" y="175" width="40" height="20" rx="3" fill="#dcfce7"/>
  <text x="245" y="190" font-size="10" fill="#166534" text-anchor="middle">Morning</text>
  <rect x="275" y="175" width="40" height="20" rx="3" fill="#fef3c7"/>
  <text x="295" y="190" font-size="10" fill="#92400e" text-anchor="middle">Noon</text>
  <rect x="225" y="205" width="40" height="20" rx="3" fill="#fee2e2"/>
  <text x="245" y="220" font-size="10" fill="#991b1b" text-anchor="middle">Evening</text>
  <rect x="275" y="205" width="40" height="20" rx="3" fill="#e0e7ff"/>
  <text x="295" y="220" font-size="10" fill="#3730a3" text-anchor="middle">Night</text>
  <!-- Clipboard -->
  <rect x="320" y="170" width="60" height="80" rx="4" fill="#fff" stroke="#d1d5db"/>
  <rect x="325" y="175" width="50" height="6" fill="#9ca3af"/>
  <rect x="330" y="188" width="30" height="3" fill="#d1d5db"/>
  <rect x="330" y="196" width="40" height="3" fill="#d1d5db"/>
  <rect x="330" y="204" width="25" height="3" fill="#d1d5db"/>
  <rect x="330" y="212" width="35" height="3" fill="#d1d5db"/>
  <rect x="330" y="220" width="30" height="3" fill="#d1d5db"/>
  <rect x="330" y="228" width="38" height="3" fill="#d1d5db"/>
  <rect x="330" y="236" width="22" height="3" fill="#d1d5db"/>
</svg>